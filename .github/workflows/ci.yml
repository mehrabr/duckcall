name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: gofmt
        run: test -z "$(gofmt -l .)"
      - name: vet
        run: go vet ./...
      - name: test
        run: go test -race ./...
      - name: fuzz (smoke)
        run: |
          go test -fuzz=FuzzDecodeChunk -fuzztime=20s ./codec
          go test -fuzz=FuzzDecodePrepare -fuzztime=10s ./codec
          go test -fuzz=FuzzDecodeFetch -fuzztime=10s ./codec
      - name: deslop
        if: github.event_name == 'pull_request'
        run: scripts/deslop.sh --range "origin/${{ github.base_ref }}..HEAD"

  # Conformance: the live type matrix and the differential harness against
  # a real quack_serve driven by the official client. Optional because it
  # installs duckdb (and the quack extension) from the network at job time.
  live-conformance:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: install duckdb
        run: |
          curl -fsSL https://install.duckdb.org | sh
          echo "$HOME/.duckdb/cli/latest" >> "$GITHUB_PATH"
      - name: live matrix + differential
        run: QUACK_LIVE=1 go test -race -run 'TestLive' -v .
